name: Run inputs tests

on:
  workflow_call:
    inputs:
      override-cache:
        description: 'Override Cache?'
        required: true
        type: boolean
      os:
        description: 'GitHub Actions runner label to execute this test job on
          (e.g. ubuntu-latest, macos-latest, windows-latest).'
        required: true
        type: string
      name:
        description: 'Logical name of the matrix entry, used for display and reporting
          (for example: jvm, native, android, ios)'
        required: true
        type: string
      arch:
        description: 'Target architecture for this test run
          (for example: x64, arm64)'
        required: true
        type: string
      testArgs:
        description: 'Gradle command-line arguments specifying which tests to run'
        required: true
        type: string
      enable-kvm:
        description: 'Enable KVM for Android emulator tests'
        required: false
        default: false
        type: boolean
      xcode-version:
        description: 'Xcode version for Apple platform tests (macos runners only)'
        required: false
        default: ''
        type: string
      kotlin-version:
        description: 'Override Kotlin version?'
        required: false
        default: ''
        type: string
      testballoon-version:
        description: 'Override TestBalloon version (full version string)?'
        required: false
        default: ''
        type: string

jobs:
  test:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 300

    env:
      KOTLIN_VERSION_ENV: ${{ inputs.kotlin-version }}
      TESTBALLOON_VERSION_OVERRIDE: ${{ inputs.testballoon-version }}

    steps:
      - name: Common setup
        uses: a-sit-plus/internal-workflows/.github/actions/runner-setup@feature/modularTests
        with:
          xcode-version: ${{ inputs.xcode-version }}
          enable-kvm: ${{ inputs.enable-kvm }}
          override-cache: ${{ inputs.override-cache }}

      - name: Run tests
        shell: 'bash'
        run: ./gradlew -Dkotlin.build.report.json.directory="$PWD/metrics" ${{ inputs.testArgs }}

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        with:
          name: All Tests (${{ inputs.os }}-${{ inputs.name }}-${{ inputs.arch }})
          path: "**/build/test-results/**/TEST*.xml,**/build/outputs/androidTest-results/managedDevice/**/TEST*.xml"
          list-suites: failed
          list-tests: failed
          reporter: java-junit
          use-actions-summary: true

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ inputs.os }}-${{ inputs.name }}-${{ inputs.arch }}
          path: metrics/*.json
          if-no-files-found: ignore
